# ==========================================================
# STAGING DEPLOYMENT - EC2 behind ALB
# ==========================================================
# Runs web (port 3001) and backend (port 3000) containers.
# ALB handles subdomain routing + SSL termination.
# Containers bind to 0.0.0.0 so ALB health checks can reach them.
#
# Each app gets its own subdomain via ALB host-header rules:
#   - stg-qlegal.quanbyai.com      → web:3001 (API proxied via Next /api when same-origin)
#   - stg-qlegal-be.quanbyai.com  → backend:3000 (optional separate API host)
#
# This file is stored in SSM Parameter Store (base64) and
# pulled by EC2 instances on boot via the deploy script.
# ==========================================================

services:
  # ----------------------------------------------------------
  # Web Application (Next.js)
  # ----------------------------------------------------------
  web:
    image: ${ECR_REGISTRY}/${ECR_REPOSITORY_WEB}:${IMAGE_TAG:-latest}
    container_name: staging-web
    ports:
      - "0.0.0.0:3001:3001"
    environment:
      - NODE_ENV=production
      - PORT=3001
      - INTERNAL_API_BASE_URL=http://backend:3000/api
      - NEXT_PUBLIC_APP_URL=${NEXT_PUBLIC_APP_URL}
      - NEXT_PUBLIC_API_BASE_URL=${NEXT_PUBLIC_API_BASE_URL}
      - NEXT_PUBLIC_API_VERSION=${NEXT_PUBLIC_API_VERSION}
      - NEXT_PUBLIC_ENABLE_LMS_INTEGRATION=${NEXT_PUBLIC_ENABLE_LMS_INTEGRATION:-true}
      - ONBOARDING_MANUAL_UNLOCK_PASSWORD=${ONBOARDING_MANUAL_UNLOCK_PASSWORD:-}
    depends_on:
      backend:
        condition: service_healthy
    restart: unless-stopped

  # ----------------------------------------------------------
  # Backend API (NestJS)
  # ----------------------------------------------------------
  backend:
    image: ${ECR_REGISTRY}/${ECR_REPOSITORY_BACKEND}:${IMAGE_TAG:-latest}
    container_name: staging-backend
    ports:
      - "0.0.0.0:3000:3000"
    environment:
      - NODE_ENV=production
      - PORT=3000
      - DATABASE_URL=${DATABASE_URL}
      - CORS_ORIGINS=${CORS_ORIGINS}
      - BETTER_AUTH_SECRET=${BETTER_AUTH_SECRET}
      - BETTER_AUTH_URL=${BETTER_AUTH_URL}
      - BETTER_AUTH_TRUSTED_ORIGINS=${BETTER_AUTH_TRUSTED_ORIGINS}
      - BETTER_AUTH_COOKIE_DOMAIN=${BETTER_AUTH_COOKIE_DOMAIN}
      - GOOGLE_CLIENT_ID=${GOOGLE_CLIENT_ID}
      - GOOGLE_CLIENT_SECRET=${GOOGLE_CLIENT_SECRET}
      # Lobby location verification (reverse geocoding)
      - GOOGLE_MAPS_API_KEY=${GOOGLE_MAPS_API_KEY}
      - PROXYCHECK_API_KEY=${PROXYCHECK_API_KEY}
      # QLearn LMS — ENP onboarding certification course handoff
      # MUST be https://qlearn-core.quanbyit.com/api/v1 (never stg-qlegal.quanbyai.com / backend:3000)
      - LMS_INTEGRATION_BASE_URL=${LMS_INTEGRATION_BASE_URL}
      - LMS_INTEGRATION_API_KEY=${LMS_INTEGRATION_API_KEY}
      - LMS_INTEGRATION_COURSE_URL=${LMS_INTEGRATION_COURSE_URL}
      - LMS_INTEGRATION_SSO_REDIRECT_URI=${LMS_INTEGRATION_SSO_REDIRECT_URI:-}
      - LMS_INTEGRATION_QLEGAL_RETURN_URI=${LMS_INTEGRATION_QLEGAL_RETURN_URI}
      - LMS_INTEGRATION_SSO_HANDOFF_MODE=${LMS_INTEGRATION_SSO_HANDOFF_MODE:-create_code}
      - LMS_INTEGRATION_SSO_REDEEM_URL=${LMS_INTEGRATION_SSO_REDEEM_URL:-}
      - LMS_INTEGRATION_SHARED_SECRET=${LMS_INTEGRATION_SHARED_SECRET:-}
      - LMS_INTEGRATION_DEFAULT_CLASS_CODE=${LMS_INTEGRATION_DEFAULT_CLASS_CODE}
      - LMS_INTEGRATION_DEFAULT_COURSE_ID=${LMS_INTEGRATION_DEFAULT_COURSE_ID}
      - LMS_INTEGRATION_ENROLLMENT_MODE=${LMS_INTEGRATION_ENROLLMENT_MODE:-skip}
      # AltPayNet TLPE meeting payments (live API; whitelist staging EC2 egress IP with AltPayNet)
      - MEETING_PAYMENT_PROVIDER=${MEETING_PAYMENT_PROVIDER:-tlpe}
      - TLPE_AUTHORIZATION=${TLPE_AUTHORIZATION}
      - TLPE_SECRET=${TLPE_SECRET}
      - TLPE_API_URL=${TLPE_API_URL:-https://api.tlpe.io}
      - TLPE_PAYMENT_LINK_URL=${TLPE_PAYMENT_LINK_URL:-}
      - TLPE_PAYMENT_OPTION_CODE=${TLPE_PAYMENT_OPTION_CODE:-}
      - TLPE_CALLBACK_URL=${TLPE_CALLBACK_URL:-https://stg-qlegal.quanbyai.com/appointments}
    healthcheck:
      test:
        [
          "CMD",
          "wget",
          "--no-verbose",
          "--tries=1",
          "--spider",
          "http://localhost:3000/api/v1/health",
        ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    restart: unless-stopped
